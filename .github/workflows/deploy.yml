name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject API Key
        run: |
          sed -i "s/API_KEY_PLACEHOLDER/${{ secrets.WEATHER_API_KEY }}/g" script.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # папка, которую нужно опубликовать
          branch: gh-pages # ветка, где будет лежать готовый сайт